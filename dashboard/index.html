        // Filter listeners
        $("#filterVerdict").addEventListener("change", renderFindings);
        $("#filterSev").addEventListener("change", renderFindings);
        $("#filterCat").addEventListener("change", renderFindings);
        $("#filterStrategy").addEventListener("change", renderFindings);
        $("#filterSearch").addEventListener("input", renderFindings);
      }

      function populateStrategyDropdown() {
        const sel = $("#filterStrategy");
        if (!sel || !report) return;
        sel.innerHTML = '<option value="">All</option>';
        const strategies = [
          ...new Set(
            report.rounds.flatMap((round) =>
              round.results.map((r) => r.attack.strategyName).filter(Boolean),
            ),
          ),
        ].sort();
        strategies.forEach((s) => {
          const opt = document.createElement("option");
          opt.value = s;
          opt.textContent = s
            .replace(/_/g, " ")
            .replace(/\b\w/g, (l) => l.toUpperCase());
          sel.appendChild(opt);
        });
      }

      function fmtCat(c) {
        return c.replace(/_/g, " ").replace(/\b\w/g, (l) => l.toUpperCase());
      }

      function renderCategories() {
        const bc = report.summary.byCategory;
        const cats = Object.entries(bc).sort(
          (a, b) => b[1].passed - a[1].passed,
        );
        const el = $("#catChart");

        // Compute partial counts from round results
        const partialByCat = {};
        for (const round of report.rounds) {
          for (const r of round.results) {
            if (r.verdict === "PARTIAL") {
              partialByCat[r.attack.category] =
                (partialByCat[r.attack.category] || 0) + 1;
            }
          }
        }

        el.innerHTML =
          '<div class="cat-grid">' +
          cats
            .map(([cat, data]) => {
              const partial = partialByCat[cat] || 0;
              const fail = data.total - data.passed - partial;
              const passW = data.total ? (data.passed / data.total) * 100 : 0;
              const partialW = data.total ? (partial / data.total) * 100 : 0;
              const failW = data.total ? (fail / data.total) * 100 : 0;
              return `<div class="cat-row">
      <div class="cat-name" title="${fmtCat(cat)}">${fmtCat(cat)}</div>
      <div class="cat-bar-bg">
        <div class="cat-bar-pass" style="width:${passW}%"></div>
        <div class="cat-bar-partial" style="width:${partialW}%"></div>
        <div class="cat-bar-fail" style="width:${failW}%"></div>
      </div>
      <div class="cat-count">${data.passed}/${data.total}</div>
    </div>`;
            })
            .join("") +
          "</div>";
      }

      function renderStrategies() {
        const stratData = {};

        // Collect comprehensive strategy data
        for (const round of report.rounds) {
          for (const r of round.results) {
            if (r.attack.strategyName) {
              const name = r.attack.strategyName;
              const strategy = r.attack.strategy || "unknown";

              if (!stratData[name]) {
                stratData[name] = {
                  name: name,
                  strategy: strategy,
                  total: 0,
                  passed: 0,
                  failed: 0,
                  partial: 0,
                  categories: new Set(),
                  level: r.attack.level || "Unknown",
                  description: getStrategyDescription(strategy),
                };
              }

              stratData[name].total++;
              stratData[name].categories.add(r.attack.category);

              if (r.verdict === "PASS") stratData[name].passed++;
              else if (r.verdict === "FAIL") stratData[name].failed++;
              else if (r.verdict === "PARTIAL") stratData[name].partial++;
            }
          }
        }

        const strategies = Object.values(stratData)
          .map((s) => ({
            ...s,
            categories: Array.from(s.categories),
            successRate:
              s.total > 0 ? Math.round((s.passed / s.total) * 100) : 0,
          }))
          .sort((a, b) => b.passed - a.passed || b.successRate - a.successRate)
          .slice(0, 12);

        const el = $("#strategySection");
        if (!strategies.length) {
          el.innerHTML = `
            <div class="strategy-empty">
              <div class="empty-icon">🛡️</div>
              <h3>No Attack Strategies Executed</h3>
              <p>Run red-team tests to see strategy effectiveness analysis</p>
            </div>`;
          return;
        }

        el.innerHTML = `
          <div class="strategy-table-container">
            <div class="strategy-table-header">
              <div class="strategy-header-metrics">
                <span class="metric"><strong>${strategies.length}</strong> strategies analyzed</span>
                <span class="metric"><strong>${strategies.reduce((sum, s) => sum + s.total, 0)}</strong> total attempts</span>
                <span class="metric"><strong>${strategies.reduce((sum, s) => sum + s.passed, 0)}</strong> successful</span>
              </div>
            </div>
            <div class="strategy-table">
              ${strategies
                .map(
                  (s) => `
                <div class="strategy-row ${s.successRate > 50 ? "high-risk" : s.successRate > 20 ? "medium-risk" : "low-risk"}">
                  <div class="strategy-info">
                    <div class="strategy-name">${esc(s.name)}</div>
                    <div class="strategy-meta">
                      <span class="level level-${s.level.toLowerCase()}">${s.level}</span>
                      <span class="categories">${s.categories.map((cat) => cat.replace("_", " ")).join(", ")}</span>
                    </div>
                    <div class="strategy-desc">${esc(s.description)}</div>
                  </div>
                  <div class="strategy-metrics">
                    <div class="success-rate ${s.successRate > 50 ? "high" : s.successRate > 20 ? "medium" : "low"}">
                      ${s.successRate}%
                    </div>
                    <div class="attempts-count">${s.total} attempts</div>
                  </div>
                  <div class="strategy-breakdown">
                    <div class="breakdown-bar">
                      <div class="bar-segment pass" style="width: ${(s.passed / s.total) * 100}%" title="${s.passed} passed"></div>
                      <div class="bar-segment partial" style="width: ${(s.partial / s.total) * 100}%" title="${s.partial} partial"></div>
                      <div class="bar-segment fail" style="width: ${(s.failed / s.total) * 100}%" title="${s.failed} failed"></div>
                    </div>
                    <div class="breakdown-stats">
                      <span class="stat pass">${s.passed}</span>
                      <span class="stat partial">${s.partial}</span>
                      <span class="stat fail">${s.failed}</span>
                    </div>
                  </div>
                </div>
              `,
                )
                .join("")}
            </div>
          </div>
        `;
      }

      function getStrategyDescription(strategy) {
        const descriptions = {
          base64_context_hint:
            "Encodes malicious instructions in Base64 to evade content filters",
          json_format_bypass:
            "Uses JSON formatting to disguise harmful requests as structured data",
          educational_series_framing:
            "Frames attacks as educational content or examples",
          fiction_writing_escape:
            "Disguises harmful requests as creative writing or storytelling",
          benign_wrapper_hidden_core:
            "Wraps malicious content in seemingly harmless requests",
          incremental_escalation_setup:
            "Gradually escalates from innocent to harmful requests",
          building_on_previous_context:
            "Leverages previous conversation context to build trust",
          simulated_multi_turn_conversation:
            "Simulates realistic multi-turn conversations",
          translation_request_disguise:
            "Disguises attacks as translation or language requests",
          rot13_cipher_trick:
            "Uses ROT13 or simple ciphers to encode harmful instructions",
          reverse_instruction: "Reverses or obfuscates instruction order",
          poetic_metaphor_request:
            "Uses poetry or metaphors to disguise harmful content",
          multi_language_obfuscation:
            "Uses multiple languages to confuse content filters",
          role_consistency_override:
            "Attempts to override AI role or system instructions",
          academic_computation_disguise:
            "Frames attacks as academic or research queries",
        };
        return descriptions[strategy] || "Advanced red-team attack technique";
      }

      let owaspResults = [];
      let owaspAnalyzing = false;

      // Auto-fill model when provider changes (use delegation since element is inside render() template)
      document.addEventListener("change", (e) => {
        if (e.target && e.target.id === "owaspProvider") {
          const defaults = { anthropic: "claude-sonnet-4-20250514", openai: "gpt-4o", openrouter: "anthropic/claude-sonnet-4-20250514" };
          const modelEl = document.getElementById("owaspModel");
          if (modelEl) modelEl.value = defaults[e.target.value] || "";
        }
      });

      async function loadFrameworkSelector() {
        const el = document.getElementById("frameworkSelector");
        if (!el) return;
        try {
          const resp = await fetch("/api/compliance-frameworks");
          const frameworks = await resp.json();
          el.innerHTML = frameworks.map(fw => `
            <label class="fw-chip">
              <input type="checkbox" class="fw-checkbox" value="${esc(fw.id)}" checked />
              ${esc(fw.name)}
              <span class="fw-count">${fw.controlCount}</span>
            </label>
          `).join("");
        } catch {
          el.innerHTML = "";
        }
      }

      async function runOwaspAnalysis() {
        if (owaspAnalyzing || !reportSelect.value) return;
        owaspAnalyzing = true;

        const btn = $("#owaspAnalyzeBtn");
        const progress = $("#owaspProgress");
        const progressText = $("#owaspProgressText");
        const progressFill = $("#owaspProgressFill");

        // Get selected frameworks
        const selectedFrameworks = [];
        document.querySelectorAll(".fw-checkbox:checked").forEach((cb) => {
          selectedFrameworks.push(cb.value);
        });

        // Reset
        owaspResults = [];
        $("#owaspResults").style.display = "none";
        $("#complianceFrameworkResults").innerHTML = "";
        const csvBtnR = document.getElementById("complianceCsvBtn");
        const jsonBtnR = document.getElementById("complianceJsonBtn");
        if (csvBtnR) csvBtnR.style.display = "none";
        if (jsonBtnR) jsonBtnR.style.display = "none";

        btn.disabled = true;
        btn.textContent = "Analyzing with LLM...";
        progress.style.display = "block";
        progressFill.style.width = "0%";

        let completed = 0;

        try {
          const providerEl = document.getElementById("owaspProvider");
          const modelEl = document.getElementById("owaspModel");
          const res = await fetch("/api/owasp-analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              reportFile: reportSelect.value,
              provider: providerEl ? providerEl.value : "anthropic",
              model: modelEl ? modelEl.value : "claude-sonnet-4-20250514",
              frameworkIds: selectedFrameworks.length > 0 ? selectedFrameworks : undefined,
            }),
          });

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
              if (!line.trim()) continue;
              try {
                const item = JSON.parse(line);
                owaspResults.push(item);
                completed++;
                progressText.textContent = `Analyzing ${item.code} — ${item.title}... (${completed} items)`;
                progressFill.style.width = `${Math.min(completed * 5, 95)}%`;
                renderOwaspResults();
              } catch {}
            }
          }

          if (buffer.trim()) {
            try {
              owaspResults.push(JSON.parse(buffer));
              renderOwaspResults();
            } catch {}
          }

          btn.textContent = "Re-run Compliance Analysis";
          progressText.textContent = `Analysis complete — ${owaspResults.length} item${owaspResults.length !== 1 ? "s" : ""} analyzed`;
          // Show download buttons
          const csvBtn = document.getElementById("complianceCsvBtn");
          const jsonBtn = document.getElementById("complianceJsonBtn");
          if (csvBtn) csvBtn.style.display = "inline-block";
          if (jsonBtn) jsonBtn.style.display = "inline-block";
          progressFill.style.width = "100%";
        } catch (err) {
          progressText.textContent = `Error: ${err.message}`;
          btn.textContent = "Retry Compliance Analysis";
        }

        btn.disabled = false;
        owaspAnalyzing = false;
      }

      function renderOwaspResults() {
        const resultsEl = $("#owaspResults");
        resultsEl.style.display = "block";
        const container = $("#complianceFrameworkResults");

        // Group results by framework
        const byFramework = {};
        for (const r of owaspResults) {
          const fw = r.framework || "Unknown";
          if (!byFramework[fw]) byFramework[fw] = [];
          byFramework[fw].push(r);
        }

        const fwNames = Object.keys(byFramework);

        container.innerHTML = fwNames.map(fw => {
          const items = byFramework[fw];
          const fwId = fw.replace(/[^a-zA-Z0-9]/g, "_");
          const vuln = items.filter(i => i.status === "vulnerable").length;
          const risk = items.filter(i => i.status === "at_risk").length;
          const secure = items.filter(i => i.status === "secure").length;
          const notTested = items.filter(i => i.status === "not_tested").length;
          const total = items.length || 1;

          return `<div class="compliance-fw-section">
            <div class="compliance-fw-header">
              <div class="compliance-fw-title">${esc(fw)}</div>
              <div style="font-size:12px;color:var(--text2)">${items.length} controls</div>
            </div>
            <div class="compliance-summary-bar">
              ${vuln ? `<div class="compliance-summary-seg" style="width:${(vuln/total)*100}%;background:var(--red);"></div>` : ""}
              ${risk ? `<div class="compliance-summary-seg" style="width:${(risk/total)*100}%;background:var(--orange);"></div>` : ""}
              ${secure ? `<div class="compliance-summary-seg" style="width:${(secure/total)*100}%;background:var(--green);"></div>` : ""}
              ${notTested ? `<div class="compliance-summary-seg" style="width:${(notTested/total)*100}%;background:var(--surface2);"></div>` : ""}
            </div>
            <div class="compliance-summary-stats">
              <div class="compliance-stat">
                <div class="compliance-stat-dot" style="background:var(--red)"></div>
                <span class="compliance-stat-num">${vuln}</span> Vulnerable
              </div>
              <div class="compliance-stat">
                <div class="compliance-stat-dot" style="background:var(--orange)"></div>
                <span class="compliance-stat-num">${risk}</span> At Risk
              </div>
              <div class="compliance-stat">
                <div class="compliance-stat-dot" style="background:var(--green)"></div>
                <span class="compliance-stat-num">${secure}</span> Secure
              </div>
              <div class="compliance-stat">
                <div class="compliance-stat-dot" style="background:var(--text2)"></div>
                <span class="compliance-stat-num">${notTested}</span> Not Tested
              </div>
            </div>
            <div id="cards_${fwId}" class="compliance-grid"></div>
          </div>`;
        }).join("");

        for (const fw of fwNames) {
          const fwId = fw.replace(/[^a-zA-Z0-9]/g, "_");
          renderOwaspCards(document.getElementById("cards_" + fwId), byFramework[fw]);
        }
      }

      function renderOwaspCards(el, items) {
        el.innerHTML = items
          .map(
            (item, i) => `
          <div class="compliance-card status-${item.status}">
            <div class="compliance-header" onclick="toggleOwaspCard(this)">
              <span class="compliance-expand">+</span>
              <span class="compliance-code">${esc(item.code)}</span>
              <span class="compliance-title">${esc(item.title)}</span>
              <span class="compliance-meta">
                ${item.attacksAnalyzed > 0 ? `<span class="c-vuln">${item.vulnerabilitiesFound}</span>/<span>${item.attacksAnalyzed}</span> attacks` : "—"}
              </span>
              <span class="compliance-status ${item.status}">${fmtStatus(item.status)}</span>
            </div>
            <div class="compliance-body">
              <div class="compliance-summary-text">${esc(item.summary)}</div>
              ${item.details ? `<div class="compliance-details">${esc(item.details)}</div>` : ""}
              ${
                item.recommendations && item.recommendations.length
                  ? `
                <div style="margin-top:8px"><strong style="font-size:12px;color:var(--accent);">Recommendations:</strong></div>
                <ol class="compliance-recs">${item.recommendations.map((r) => `<li>${esc(r)}</li>`).join("")}</ol>
              `
                  : ""
              }
              ${
                item.relevantFindings && item.relevantFindings.length
                  ? `
                <div style="margin-top:8px"><strong style="font-size:12px;color:var(--accent);">Findings:</strong></div>
                <div class="compliance-findings">${item.relevantFindings.map((f) => `<span class="compliance-finding-tag">${esc(f)}</span>`).join("")}</div>
              `
                  : ""
              }
            </div>
          </div>
        `,
          )
          .join("");
      }

      function toggleOwaspCard(header) {
        const body = header.nextElementSibling;
        const expand = header.querySelector(".compliance-expand");
        if (body.classList.contains("open")) {
          body.classList.remove("open");
          expand.textContent = "+";
        } else {
          body.classList.add("open");
          expand.textContent = "−";
        }
      }

      function fmtStatus(s) {
        return s === "at_risk"
          ? "At Risk"
          : s === "not_tested"
            ? "Not Tested"
            : s === "error"
              ? "Error"
              : s.charAt(0).toUpperCase() + s.slice(1);
      }

      function buildFindingsIndex() {
        // Map attack name+category to its full result for prompt/response/reasoning lookup
        if (report._findingsIndex) return report._findingsIndex;
        const idx = {};
        for (const round of report.rounds) {
          for (const r of round.results) {
            const key = r.attack.name + "|" + r.attack.category;
            if (!idx[key]) idx[key] = r;
          }
        }
        report._findingsIndex = idx;
        return idx;
      }

      function buildResultRows() {
        if (report._resultRows) return report._resultRows;
        const rows = [];
        report.rounds.forEach((round) => {
          round.results.forEach((result) => {
            rows.push({
              round: round.round,
              verdict: result.verdict,
              severity: result.attack.severity,
              category: result.attack.category,
              attack: result.attack.name,
              description:
                result.llmReasoning ||
                result.findings?.join("; ") ||
                result.attack.description ||
                "",
              strategyName: result.attack.strategyName || "",
              affectedFiles:
                result.affectedFiles ||
                report.affectedFiles?.[result.attack.category] ||
                [],
              result,
            });
          });
        });
        report._resultRows = rows;
        return rows;
      }

      function extractPrompt(result) {
        if (!result) return "";
        const msg =
          result.attack.payload?.message || result.attack.payload?.prompt || "";
        return typeof msg === "string" ? msg : JSON.stringify(msg);
      }

      function extractResponse(result) {
        if (!result || !result.responseBody) return "";
        const body = result.responseBody;
        if (typeof body === "string") return body;
        if (body.response)
          return typeof body.response === "string"
            ? body.response
            : JSON.stringify(body.response);
        return JSON.stringify(body);
      }

      function formatAffectedFiles(files) {
        if (!Array.isArray(files) || !files.length) return "";
        return files
          .map((af) => {
            const loc = af?.line ? `${af.file}:${af.line}` : af?.file;
            const reason = af?.reason ? ` — ${af.reason}` : "";
            return `<span class="file-tag">${esc(loc || "unknown")}${esc(reason)}</span>`;
          })
          .join("");
      }

      function formatExecutionTrace(trace) {
        if (!trace) return "";
        const transcript = Array.isArray(trace.transcript)
          ? trace.transcript
              .map((event, idx) => {
                const label =
                  event.direction === "client->server"
                    ? "client → server"
                    : event.direction === "server->client"
                      ? "server → client"
                      : "server notify";
                const method = event.method ? ` (${event.method})` : "";
                const payload = esc(
                  typeof event.payload === "string"
                    ? event.payload
                    : JSON.stringify(event.payload, null, 2),
                );
                return `<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">${idx + 1}. ${label}${method}</div><pre class="detail-pre">${payload}</pre></div>`;
              })
              .join("")
          : "";
        const meta = [
          trace.transport
            ? `<span><strong>Transport:</strong> ${esc(trace.transport)}</span>`
            : "",
          trace.operation
            ? `<span><strong>Operation:</strong> ${esc(trace.operation)}</span>`
            : "",
          trace.serverName
            ? `<span><strong>Server:</strong> ${esc(trace.serverName)}</span>`
            : "",
          trace.protocolVersion
            ? `<span><strong>Protocol:</strong> ${esc(trace.protocolVersion)}</span>`
            : "",
        ]
          .filter(Boolean)
          .join("");
        const stderr = trace.stderr
          ? `<div style="margin-top:12px"><div class="detail-label">MCP STDERR</div><pre class="detail-pre">${esc(trace.stderr)}</pre></div>`
          : "";
        return `<div style="margin-top:12px"><div class="detail-label">MCP Execution Trace</div>
          ${
            meta
              ? `<div style="margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap;color:var(--text2);font-size:12px">${meta}</div>`
              : ""
          }
          ${transcript || '<div style="color:var(--text2);font-size:12px">No transcript events captured</div>'}
          ${stderr}
        </div>`;
      }

      function formatThreatAssessment(result) {
        if (!result) return "";
        const reasoning =
          result.llmReasoning && result.llmReasoning !== "no response"
            ? result.llmReasoning
            : "";
        const evidenceFor = result.llmEvidenceFor || "";
        const evidenceAgainst = result.llmEvidenceAgainst || "";
        const verdict = result.llmVerdict || "";
        const confidence =
          typeof result.judgeConfidence === "number"
            ? `${result.judgeConfidence}%`
            : "";

        if (!reasoning && !evidenceFor && !evidenceAgainst && !verdict) {
          return "";
        }

        return `<div style="margin-top:12px">
          <div class="detail-label">Threat Assessment</div>
          <div style="margin-bottom:8px;display:flex;gap:12px;flex-wrap:wrap;color:var(--text2);font-size:12px">
            ${
              verdict
                ? `<span><strong>LLM Verdict:</strong> <span class="verdict verdict-${esc(verdict)}">${esc(verdict)}</span></span>`
                : ""
            }
            ${confidence ? `<span><strong>Confidence:</strong> ${esc(confidence)}</span>` : ""}
          </div>
          ${reasoning ? `<pre class="detail-pre detail-reasoning">${esc(reasoning)}</pre>` : ""}
          ${
            evidenceFor
              ? `<div style="margin-top:8px"><div class="detail-label">Why This Looks Risky</div><pre class="detail-pre">${esc(evidenceFor)}</pre></div>`
              : ""
          }
          ${
            evidenceAgainst
              ? `<div style="margin-top:8px"><div class="detail-label">Why This May Be Defended</div><pre class="detail-pre">${esc(evidenceAgainst)}</pre></div>`
              : ""
          }
        </div>`;
      }

      function formatIdealResponse(result) {
        if (!result?.idealResponse) return "";
        const ir = result.idealResponse;
        return `<div class="ideal-response-card">
          <div class="ideal-response-header" onclick="toggleIdealResponse(this)">
            <span style="font-size:12px">+</span>
            Ideal Response (What the endpoint should return)
          </div>
          <div class="ideal-response-body">
            <div class="ideal-response-text">${esc(ir.response)}</div>
            ${ir.explanation ? `<div class="ideal-response-explanation">${esc(ir.explanation)}</div>` : ""}
            ${
              ir.remediationHints && ir.remediationHints.length
                ? `
              <div style="margin-top:10px"><strong style="font-size:12px;color:var(--green);">Remediation Steps:</strong></div>
              <ol class="ideal-response-hints">${ir.remediationHints.map((h) => `<li>${esc(h)}</li>`).join("")}</ol>
            `
                : ""
            }
          </div>
        </div>`;
      }

      function toggleIdealResponse(header) {
        const body = header.nextElementSibling;
        const expand = header.querySelector("span");
        if (body.classList.contains("open")) {
          body.classList.remove("open");
          expand.textContent = "+";
        } else {
          body.classList.add("open");
          expand.textContent = "−";
        }
      }

      function renderFindings() {
        const verdict = $("#filterVerdict")?.value || "";
        const sev = $("#filterSev")?.value || "";
        const cat = $("#filterCat")?.value || "";
        const strategy = $("#filterStrategy")?.value || "";
        const search = ($("#filterSearch")?.value || "").toLowerCase();

        let findings = buildResultRows();
        if (verdict) findings = findings.filter((f) => f.verdict === verdict);
        if (sev) findings = findings.filter((f) => f.severity === sev);
        if (cat) findings = findings.filter((f) => f.category === cat);
        if (strategy)
          findings = findings.filter((f) => f.strategyName === strategy);
        if (search)
          findings = findings.filter(
            (f) =>
              f.description.toLowerCase().includes(search) ||
              f.attack.toLowerCase().includes(search) ||
              f.category.toLowerCase().includes(search) ||
              (f.strategyName || "").toLowerCase().includes(search) ||
              (f.verdict || "").toLowerCase().includes(search),
          );

        const el = $("#findingsTable");
        if (!findings.length) {
          el.innerHTML =
            '<div class="empty">No results match the filters</div>';
          return;
        }

        el.innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <div style="color:var(--text2);font-size:12px;">${findings.length} findings shown</div>
    <div style="display:flex;gap:8px;">
      <button onclick="expandAllFindings()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer;">Expand All</button>
      <button onclick="collapseAllFindings()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer;">Collapse All</button>
      <button onclick="expandVulnsOnly()" style="background:var(--red);border:1px solid var(--red);color:white;padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer;">Show Vulnerabilities</button>
    </div>
  </div>
  <table>
    <thead><tr><th>Verdict</th><th>Severity</th><th>Category</th><th>Attack</th><th>Details</th><th>Strategy</th><th style="width:50px"></th></tr></thead>
    <tbody id="findingsRows"></tbody>
  </table>`;

        const tbody = $("#findingsRows");
        findings.slice(0, 200).forEach((f, i) => {
          const result = f.result;
          const prompt = extractPrompt(result);
          const response = extractResponse(result);
          const affectedFilesHtml = formatAffectedFiles(f.affectedFiles);
          const executionTraceHtml = formatExecutionTrace(
            result?.executionTrace,
          );
          const threatAssessmentHtml = formatThreatAssessment(result);
          const idealResponseHtml = formatIdealResponse(result);

          const tr = document.createElement("tr");
          tr.innerHTML = `
      <td><span class="verdict verdict-${f.verdict}">${esc(f.verdict)}</span></td>
      <td><span class="sev sev-${f.severity}">${f.severity}</span></td>
      <td>${fmtCat(f.category)}</td>
      <td>${esc(f.attack)}</td>
      <td>${esc(f.description)}</td>
      <td>${f.strategyName ? esc(f.strategyName) : '<span style="color:var(--text2)">-</span>'}</td>
      <td><button class="expand-btn" data-fidx="${i}">+</button></td>`;
          tbody.appendChild(tr);

          const detailTr = document.createElement("tr");
          detailTr.classList.add("detail-row");
          detailTr.style.display = "none";
          detailTr.innerHTML = `<td colspan="7"><div class="detail-content">
      <div style="margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap;color:var(--text2);font-size:12px">
        <span><strong>Round:</strong> ${f.round}</span>
        <span><strong>Verdict:</strong> <span class="verdict verdict-${f.verdict}">${esc(f.verdict)}</span></span>
        <span><strong>Status:</strong> ${result?.statusCode ?? "-"}</span>
        <span><strong>Response Time:</strong> ${result?.responseTimeMs ?? "-"} ms</span>
      </div>
      ${
        result?.conversation
          ? renderConversation(result)
          : `<div class="detail-grid">
        <div class="detail-col">
          <div class="detail-label">Prompt</div>
          <pre class="detail-pre">${esc(prompt || "(no prompt)")}</pre>
        </div>
        <div class="detail-col">
          <div class="detail-label">Response</div>
          <pre class="detail-pre">${esc((response || "(no response)"))}${response.length > 2000 ? "" : ""}</pre>
        </div>
      </div>`
      }
      ${idealResponseHtml}
      ${threatAssessmentHtml}
      ${result?.findings?.length ? `<div style="margin-top:12px"><div class="detail-label">Verdict Details</div><div>${result.findings.map((fd) => `<span class="finding-tag">${esc(fd)}</span>`).join("")}</div></div>` : ""}
      ${affectedFilesHtml ? `<div style="margin-top:12px"><div class="detail-label">Affected Files</div><div>${affectedFilesHtml}</div></div>` : ""}
      ${executionTraceHtml}
      ${
        result?.policyUsed
          ? `<div style="margin-top:12px"><div class="detail-label">Judge Policy: ${esc(result.policyUsed.name)}</div>
        <details open><summary style="cursor:pointer;font-size:11px;color:var(--text2);margin-top:4px">View criteria</summary>
          <div style="margin-top:6px;font-size:11px;color:var(--text2)">
            ${result.policyUsed.pass_criteria?.length ? `<div style="margin-bottom:4px"><strong style="color:var(--red)">PASS if:</strong>${result.policyUsed.pass_criteria.map((c) => `<div style="margin-left:12px">• ${esc(c)}</div>`).join("")}</div>` : ""}
            ${result.policyUsed.fail_criteria?.length ? `<div style="margin-bottom:4px"><strong style="color:var(--green)">FAIL if:</strong>${result.policyUsed.fail_criteria.map((c) => `<div style="margin-left:12px">• ${esc(c)}</div>`).join("")}</div>` : ""}
            ${result.policyUsed.partial_criteria?.length ? `<div style="margin-bottom:4px"><strong style="color:var(--orange)">PARTIAL if:</strong>${result.policyUsed.partial_criteria.map((c) => `<div style="margin-left:12px">• ${esc(c)}</div>`).join("")}</div>` : ""}
            ${result.policyUsed.instructions ? `<div style="margin-top:4px;font-style:italic">${esc(result.policyUsed.instructions)}</div>` : ""}
          </div>
        </details>
      </div>`
          : ""
      }
    </div></td>`;
          tbody.appendChild(detailTr);
        });

        tbody.addEventListener("click", (e) => {
          const btn = e.target.closest(".expand-btn");
          if (!btn) return;
          const idx = parseInt(btn.dataset.fidx);
          const rows = tbody.querySelectorAll(".detail-row");
          const row = rows[idx];
          if (row.style.display === "none") {
            row.style.display = "";
            btn.textContent = "-";
          } else {
            row.style.display = "none";
            btn.textContent = "+";
          }
        });
      }

      function renderRoundTabs() {
        const el = $("#roundTabs");
        const tabs = [{ label: "All Rounds", value: 0 }];
        for (const r of report.rounds)
          tabs.push({ label: `Round ${r.round}`, value: r.round });
        el.innerHTML = tabs
          .map(
            (t) =>
              `<div class="round-tab ${t.value === activeRound ? "active" : ""}" data-round="${t.value}">${t.label}</div>`,
          )
          .join("");
        el.querySelectorAll(".round-tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            activeRound = parseInt(tab.dataset.round);
            renderRoundTabs();
            renderRoundDetail();
          });
        });
      }

      function toggleConvStep(header) {
        const body = header.nextElementSibling;
        const expand = header.querySelector(".conv-expand");
        if (body.classList.contains("open")) {
          body.classList.remove("open");
          expand.textContent = "+";
        } else {
          body.classList.add("open");
          expand.textContent = "−";
        }
      }

      // === UX IMPROVEMENT FUNCTIONS ===

      function getResponsePreview(result) {
        let preview = "";
        try {
          if (typeof result.responseBody === "string") {
            preview = result.responseBody.slice(0, 100);
          } else if (result.responseBody?.response) {
            preview = String(result.responseBody.response).slice(0, 100);
          } else if (result.responseBody) {
            preview = JSON.stringify(result.responseBody).slice(0, 100);
          } else {
            preview = `HTTP ${result.statusCode}`;
          }
          return (
            preview.replace(/\n/g, " ").trim() || `HTTP ${result.statusCode}`
          );
        } catch (e) {
          return `HTTP ${result.statusCode}`;
        }
      }

      function expandAllRounds() {
        const expandBtns = document.querySelectorAll("#roundRows .expand-btn");
        expandBtns.forEach((btn) => {
          const idx = parseInt(btn.dataset.idx);
          const rows = document.querySelectorAll("#roundRows .detail-row");
          const row = rows[idx];
          if (row && row.style.display === "none") {
            row.style.display = "table-row";
            btn.textContent = "−";
          }
        });
        updateExpandButtons();
      }

      function collapseAllRounds() {
        const expandBtns = document.querySelectorAll("#roundRows .expand-btn");
        expandBtns.forEach((btn) => {
          const idx = parseInt(btn.dataset.idx);
          const rows = document.querySelectorAll("#roundRows .detail-row");
          const row = rows[idx];
          if (row && row.style.display === "table-row") {
            row.style.display = "none";
            btn.textContent = "+";
          }
        });
        updateExpandButtons();
      }

      function expandPassOnly() {
        // First collapse all
        collapseAllRounds();
        // Then expand only PASS verdicts
        const rows = document.querySelectorAll("#roundRows .main-row");
        rows.forEach((row, i) => {
          const verdict = row.querySelector(".verdict");
          if (verdict && verdict.textContent.trim() === "PASS") {
            const btn = row.querySelector(".expand-btn");
            const detailRows = document.querySelectorAll(
              "#roundRows .detail-row",
            );
            const detailRow = detailRows[i];
            if (btn && detailRow) {
              detailRow.style.display = "table-row";
              btn.textContent = "−";
            }
          }
        });
        updateExpandButtons();
      }

      function updateExpandButtons() {
        const expandedCount = document.querySelectorAll(
          '#roundRows .detail-row[style="display: table-row;"]',
        ).length;
        const totalCount = document.querySelectorAll(
          "#roundRows .detail-row",
        ).length;

        const expandBtn = document.getElementById("expandAllBtn");
        const collapseBtn = document.getElementById("collapseAllBtn");

        if (expandBtn && collapseBtn) {
          expandBtn.style.display =
            expandedCount === totalCount ? "none" : "block";
          collapseBtn.style.display = expandedCount === 0 ? "none" : "block";
        }
      }

      // Keyboard shortcuts
      let currentRowIndex = 0;

      function highlightCurrentRow(scroll) {
        const rows = document.querySelectorAll("#roundRows .main-row");
        rows.forEach((row, i) => {
          if (i === currentRowIndex) {
            row.style.background = "rgba(88, 166, 255, 0.1)";
            if (scroll) row.scrollIntoView({ behavior: "smooth", block: "center" });
          } else {
            row.style.background = "";
          }
        });
      }

      function toggleCurrentRow() {
        const btn = document.querySelector(
          `#roundRows .expand-btn[data-idx="${currentRowIndex}"]`,
        );
        if (btn) {
          btn.click();
        }
      }

      document.addEventListener("keydown", (e) => {
        const rows = document.querySelectorAll("#roundRows .main-row");
        if (rows.length === 0) return;

        // Only handle shortcuts if not typing in an input
        if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")
          return;

        switch (e.key) {
          case "ArrowDown":
            e.preventDefault();
            currentRowIndex = Math.min(currentRowIndex + 1, rows.length - 1);
            highlightCurrentRow(true);
            break;
          case "ArrowUp":
            e.preventDefault();
            currentRowIndex = Math.max(currentRowIndex - 1, 0);
            highlightCurrentRow(true);
            break;
          case " ":
            e.preventDefault();
            toggleCurrentRow();
            break;
          case "a":
          case "A":
            if (e.ctrlKey || e.metaKey) return; // Don't interfere with Ctrl+A
            e.preventDefault();
            expandAllRounds();
            break;
          case "c":
          case "C":
            e.preventDefault();
            collapseAllRounds();
            break;
          case "p":
          case "P":
            e.preventDefault();
            expandPassOnly();
            break;
        }
      });

      // Auto-expand PASS verdicts on load
      function autoExpandImportant() {
        setTimeout(() => {
          const rows = document.querySelectorAll("#roundRows .main-row");
          rows.forEach((row, i) => {
            const verdict = row.querySelector(".verdict");
            if (verdict && verdict.textContent.trim() === "PASS") {
              const btn = row.querySelector(".expand-btn");
              if (btn && btn.textContent === "+") {
                btn.click();
              }
            }
          });
        }, 100);
      }

      // === FINDINGS TABLE FUNCTIONS ===

      function expandAllFindings() {
        const expandBtns = document.querySelectorAll(
          "#findingsRows .expand-btn",
        );
        expandBtns.forEach((btn) => {
          const idx = parseInt(btn.dataset.fidx);
          const tbody = document.querySelector("#findingsRows");
          const rows = tbody.querySelectorAll(".detail-row");
          const row = rows[idx];
          if (row && row.style.display === "none") {
            row.style.display = "";
            btn.textContent = "−";
          }
        });
      }

      function collapseAllFindings() {
        const expandBtns = document.querySelectorAll(
          "#findingsRows .expand-btn",
        );
        expandBtns.forEach((btn) => {
          const idx = parseInt(btn.dataset.fidx);
          const tbody = document.querySelector("#findingsRows");
          const rows = tbody.querySelectorAll(".detail-row");
          const row = rows[idx];
          if (row && row.style.display !== "none") {
            row.style.display = "none";
            btn.textContent = "+";
          }
        });
      }

      function expandVulnsOnly() {
        // First collapse all
        collapseAllFindings();
        // Then expand only PASS/PARTIAL
        const mainRows = document.querySelectorAll(
          "#findingsRows tr:not(.detail-row)",
        );
        mainRows.forEach((row, i) => {
          const verdict = row.querySelector(".verdict");
          if (
            verdict &&
            (verdict.textContent.trim() === "PASS" ||
              verdict.textContent.trim() === "PARTIAL")
          ) {
            const btn = row.querySelector(".expand-btn");
            if (btn) {
              const idx = parseInt(btn.dataset.fidx);
              const tbody = document.querySelector("#findingsRows");
              const detailRows = tbody.querySelectorAll(".detail-row");
              const detailRow = detailRows[idx];
              if (detailRow) {
                detailRow.style.display = "";
                btn.textContent = "−";
              }
            }
          }
        });
      }

      // === CONVERSATION STEP FUNCTIONS ===

      function expandAllSteps(conversationId) {
        const conversation = document.getElementById(conversationId);
        if (!conversation) return;

        const steps = conversation.querySelectorAll(".conv-step");
        steps.forEach((step) => {
          const body = step.querySelector(".conv-step-body");
          const expand = step.querySelector(".conv-expand");
          if (body && expand) {
            body.classList.add("open");
            expand.textContent = "−";
          }
        });
      }

      function collapseAllSteps(conversationId) {
        const conversation = document.getElementById(conversationId);
        if (!conversation) return;

        const steps = conversation.querySelectorAll(".conv-step");
        steps.forEach((step) => {
          const body = step.querySelector(".conv-step-body");
          const expand = step.querySelector(".conv-expand");
          if (body && expand) {
            body.classList.remove("open");
            expand.textContent = "+";
          }
        });
      }

      function expandLastStep(conversationId) {
        const conversation = document.getElementById(conversationId);
        if (!conversation) return;

        // First collapse all
        collapseAllSteps(conversationId);

        // Then expand the last step
        const steps = conversation.querySelectorAll(".conv-step");
        if (steps.length > 0) {
          const lastStep = steps[steps.length - 1];
          const body = lastStep.querySelector(".conv-step-body");
          const expand = lastStep.querySelector(".conv-expand");
          if (body && expand) {
            body.classList.add("open");
            expand.textContent = "−";
          }

        }
      }

      // Conversation steps are now expanded by default in renderConversation,
      // so this auto-expand pass is a no-op (kept for backward-compat callers).
      function autoExpandConversationSteps() {}

      function renderConversation(r) {
        if (!r.conversation || !r.conversation.length)
          return renderSingleTurn(r);

        const conversationId = `conv-${Math.random().toString(36).substr(2, 9)}`;
        return `<div class="conversation" id="${conversationId}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:8px 0;border-bottom:1px solid var(--border);">
        <div style="font-weight:600;color:var(--text);">Multi-turn Conversation (${r.conversation.length} steps)</div>
        <div style="display:flex;gap:8px;">
          <button onclick="expandAllSteps('${conversationId}')" style="background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:3px 6px;border-radius:3px;font-size:10px;cursor:pointer;">Expand All</button>
          <button onclick="collapseAllSteps('${conversationId}')" style="background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:3px 6px;border-radius:3px;font-size:10px;cursor:pointer;">Collapse All</button>
          <button onclick="expandLastStep('${conversationId}')" style="background:var(--orange);border:1px solid var(--orange);color:white;padding:3px 6px;border-radius:3px;font-size:10px;cursor:pointer;">Show Last</button>
        </div>
      </div>
          <div class="detail-label">Conversation (${r.conversation.length} steps)</div>
          ${r.conversation
            .map((step) => {
              const payloadStr = JSON.stringify(step.payload, null, 2);
              const respStr =
                typeof step.responseBody === "string"
                  ? step.responseBody
                  : JSON.stringify(step.responseBody, null, 2);
              const requestPreview = (
                step.payload?.message ||
                step.payload ||
                ""
              )
                .toString()
                .slice(0, 80);
              const responsePreview = respStr.slice(0, 80).replace(/\n/g, " ");

              return `<div class="conv-step">
              <div class="conv-step-header" onclick="toggleConvStep(this)">
                <span class="conv-expand">−</span>
                <span class="step-num">${step.stepIndex + 1}</span>
                <div style="flex-grow:1;">
                  <div>Step ${step.stepIndex + 1}</div>
                  <div style="font-size:10px;color:var(--text2);margin-top:1px;">
                    <span style="color:var(--accent);">→</span> ${esc(requestPreview)}${requestPreview.length >= 80 ? "..." : ""}
                  </div>
                  <div style="font-size:10px;color:var(--text2);">
                    <span style="color:var(--green);">←</span> ${esc(responsePreview)}${responsePreview.length >= 80 ? "..." : ""}
                  </div>
                </div>
                <span class="step-status">HTTP ${step.statusCode} · ${step.responseTimeMs}ms</span>
              </div>
              <div class="conv-step-body open">
                <div class="conv-exchange">
                  <div class="detail-col">
                    <div class="detail-label">Request Payload</div>
                    <pre class="detail-pre">${esc(payloadStr)}</pre>
                  </div>
                  <div class="detail-col">
                    <div class="detail-label">Response</div>
                    <pre class="detail-pre">${esc((respStr || "(no response)").slice(0, 2000))}${(respStr || "").length > 2000 ? "\n... (truncated)" : ""}</pre>
                  </div>
                </div>
              </div>
            </div>`;
            })
            .join("")}

        const rows = [headers.join(",")];
        for (const r of owaspResults) {
          rows.push([
            r.framework, r.code, r.title, r.status,
            r.attacksAnalyzed, r.vulnerabilitiesFound,
            r.summary, r.details,

        const blob = new Blob([rows.join("\n")], { type: "text/csv" });

      document.getElementById("startRunBtn").addEventListener("click", async () => {
        const errEl = document.getElementById("runError");
        errEl.textContent = "";

        let configObj;
        try {
          configObj = JSON.parse(runConfigEditor.value);
        } catch (e) {
          errEl.textContent = "Invalid JSON: " + e.message;
          return;
        }

        const btn = document.getElementById("startRunBtn");
        btn.disabled = true;

          const resp = await fetch("/api/run", {

            body: JSON.stringify(configObj),
          });
          const data = await resp.json();
          if (!resp.ok) {
            errEl.textContent = data.error || "Failed to start run";
            return;
          }
          pollRun(data.runId);
          refreshActiveRuns();
        } catch (e) {
          errEl.textContent = "Request failed: " + e.message;

      // ── Sidebar run tracking ──
      const pollingRuns = new Set();
      let selectedRunId = null;
      const runDataCache = new Map();

      function pollRun(runId) {
        if (pollingRuns.has(runId)) return;
        pollingRuns.add(runId);

        let progressOffset = 0;
        const interval = setInterval(async () => {
          try {
            const resp = await fetch(`/api/run/${runId}?since=${progressOffset}`);
            const data = await resp.json();
            progressOffset = data.progressTotal;

            // Merge new progress into cached entry instead of replacing
            const cached = runDataCache.get(runId);
            if (cached && data.progress?.length > 0) {
              cached.progress = [...(cached.progress || []), ...data.progress];
            }
            const merged = cached || data;
            // Always update non-progress fields
            merged.status = data.status;
            merged.error = data.error;
            merged.finishedAt = data.finishedAt;
            merged.summary = data.summary;
            merged.reportFile = data.reportFile;
            merged.progressTotal = data.progressTotal;
            merged.targetUrl = data.targetUrl || merged.targetUrl;
            if (!cached) merged.progress = data.progress || [];
            runDataCache.set(runId, merged);

            renderSidebarRuns();
            if (selectedRunId === runId) renderRunMainPanel(runId, merged);

            if (data.status === "done" || data.status === "error") {
              clearInterval(interval);
              pollingRuns.delete(runId);
              if (data.status === "done") {
                loadReportsMeta();
              }
              renderSidebarRuns();
            }
          } catch {
            // ignore transient errors
          }
        }, 2000);
      }

      function selectRun(runId) {
        selectedRunId = runId;
        currentFile = null;
        // Hide download buttons for live runs
        $("#downloadCsvBtn").style.display = "none";
        $("#downloadJsonBtn").style.display = "none";
        // Deselect report items
        document.querySelectorAll(".report-item").forEach((el) => {
          el.classList.remove("active");
        });
        renderSidebarRuns();
        const data = runDataCache.get(runId);
        if (data) renderRunMainPanel(runId, data);
      }

      function renderSidebarRuns() {
        const container = document.getElementById("sidebarRuns");
        const activeRuns = [...runDataCache.entries()]
          .filter(([, d]) => d.status === "queued" || d.status === "running" || d.status === "error" || d.status === "cancelled")
          .sort((a, b) => new Date(b[1].startedAt).getTime() - new Date(a[1].startedAt).getTime());

        if (activeRuns.length === 0) {
          container.innerHTML = "";
          return;
        }

        const html = activeRuns.map(([runId, data]) => {
          const isActive = selectedRunId === runId ? " active" : "";
          const statusClass = data.status; // running, queued, error
          const lastProgress = data.progress?.length > 0 ? data.progress[data.progress.length - 1] : null;
          const lastMsg = lastProgress ? lastProgress.message : "";
          const targetUrl = data.targetUrl || data.config?.target?.baseUrl || "unknown";

          let iconText = "";
          if (data.status === "running") iconText = "...";
          else if (data.status === "queued") iconText = "Q";
          else if (data.status === "error") iconText = "!";

          const timeStr = new Date(data.startedAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

          const progressText = data.status === "running" && lastMsg
            ? `[${lastProgress.phase}] ${lastMsg.slice(0, 50)}`
            : data.status === "error"
              ? (data.error || "Failed").slice(0, 50)
              : "Waiting...";

          const cancelBtn = (data.status === "running" || data.status === "queued")
            ? `<button onclick="event.stopPropagation();cancelRun('${runId}')" style="background:none;border:1px solid var(--red);color:var(--red);border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer;flex-shrink:0;" title="Cancel run">Cancel</button>`
            : "";

          return `<div class="run-item${isActive}" onclick="selectRun('${runId}')">
            <div class="run-item-icon ${statusClass}">${iconText}</div>
            <div class="run-item-info">
              <div class="run-item-status" style="display:flex;justify-content:space-between;align-items:center;">
                <span>${data.status === "running" ? "Running" : data.status === "queued" ? "Queued" : "Error"} &middot; ${timeStr}</span>
                ${cancelBtn}
              </div>
              <div class="run-item-target" title="${esc(targetUrl)}">${esc(targetUrl)}</div>
              <div class="run-item-progress">${esc(progressText)}</div>
            </div>
          </div>`;
        }).join("");

        container.innerHTML = `<div class="sidebar-runs-section">
          <div class="sidebar-runs-label">Active Runs (${activeRuns.length})</div>
          ${html}
        </div>`;
      }

      function renderRunMainPanel(runId, data) {
        // Update header
        const targetUrl = data.targetUrl || data.config?.target?.baseUrl || "unknown";
        $("#metaTarget").textContent = targetUrl;
        const statusLabels = { queued: "Queued", running: "Running...", done: "Completed", error: "Error", cancelled: "Cancelled" };
        const statusColors = { queued: "var(--text2)", running: "var(--accent)", done: "var(--green)", error: "var(--red)", cancelled: "var(--orange)" };
        $("#metaDate").innerHTML = `<span style="color:${statusColors[data.status] || "var(--text2)"}">${statusLabels[data.status] || data.status}</span>`;

        // Extract live results from progress events
        const liveResults = (data.progress || [])
          .filter(p => p.result)
          .map(p => p.result);

        // Build live summary stats
        const totalAttacks = liveResults.length;
        const passed = liveResults.filter(r => r.verdict === "PASS").length;
        const failed = liveResults.filter(r => r.verdict === "FAIL").length;
        const partial = liveResults.filter(r => r.verdict === "PARTIAL").length;
        const errors = liveResults.filter(r => r.verdict === "ERROR").length;
        const liveScore = totalAttacks > 0 ? Math.round(((failed + errors) / totalAttacks) * 100) : 0;

        $("#metaScore").textContent = totalAttacks > 0 ? `Score: ~${liveScore}/100` : "";

        // Show download buttons if run completed and has a report file
        if (data.status === "done" && data.reportFile) {
          const reportFilename = data.reportFile.split("/").pop();
          $("#downloadCsvBtn").style.display = "inline-block";
          $("#downloadCsvBtn").onclick = () => {
            const a = document.createElement("a");
            a.href = `/api/report-csv/${reportFilename}`;
            a.download = reportFilename.replace(/\.json$/, ".csv");
            a.click();
          };
          $("#downloadJsonBtn").style.display = "inline-block";
          $("#downloadJsonBtn").onclick = () => {
            const a = document.createElement("a");
            a.href = `/api/report/${reportFilename}`;
            a.download = reportFilename;
            a.click();
          };
        } else {
          $("#downloadCsvBtn").style.display = "none";
          $("#downloadJsonBtn").style.display = "none";
        }

        // Build category breakdown from live results
        const categories = {};
        for (const r of liveResults) {
          const cat = r.category;
          if (!categories[cat]) categories[cat] = { pass: 0, fail: 0, partial: 0, error: 0, total: 0 };
          categories[cat].total++;
          if (r.verdict === "PASS") categories[cat].pass++;
          else if (r.verdict === "FAIL") categories[cat].fail++;
          else if (r.verdict === "PARTIAL") categories[cat].partial++;
          else categories[cat].error++;
        }

        // Summary cards
        const summaryHtml = totalAttacks > 0 ? `
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;">
              <div style="font-size:24px;font-weight:700;color:${scoreColor(liveScore)}">${liveScore}</div>
              <div style="font-size:11px;color:var(--text2)">Security Score (live)</div>
            </div>
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;">
              <div style="font-size:24px;font-weight:700">${totalAttacks}</div>
              <div style="font-size:11px;color:var(--text2)">Total Attacks</div>
            </div>
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;">
              <div style="font-size:24px;font-weight:700;color:var(--red)">${passed}</div>
              <div style="font-size:11px;color:var(--text2)">Vulnerabilities</div>
            </div>
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;">
              <div style="font-size:24px;font-weight:700;color:var(--green)">${failed}</div>
              <div style="font-size:11px;color:var(--text2)">Blocked</div>
            </div>
          </div>` : "";

        // Category breakdown chart
        const catEntries = Object.entries(categories).sort((a, b) => b[1].total - a[1].total);
        const maxCatTotal = catEntries.length > 0 ? Math.max(...catEntries.map(([,v]) => v.total)) : 1;
        const categoryHtml = catEntries.length > 0 ? `
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;">
            <div style="font-size:13px;font-weight:600;margin-bottom:12px;">Category Breakdown <span style="color:var(--text2);font-weight:400">${catEntries.length} categories</span></div>
            ${catEntries.map(([cat, v]) => {
              const catLabel = cat.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
              const barWidth = (v.total / maxCatTotal) * 100;
              const passW = v.total > 0 ? (v.pass / v.total) * barWidth : 0;
              const failW = v.total > 0 ? (v.fail / v.total) * barWidth : 0;
              const partialW = v.total > 0 ? (v.partial / v.total) * barWidth : 0;
              const errorW = v.total > 0 ? (v.error / v.total) * barWidth : 0;
              return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                <div style="width:160px;text-align:right;font-size:11px;color:var(--text2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(catLabel)}">${esc(catLabel)}</div>
                <div style="flex:1;height:14px;background:var(--surface2);border-radius:3px;overflow:hidden;display:flex;">
                  ${passW > 0 ? `<div style="width:${passW}%;background:var(--red);"></div>` : ''}
                  ${partialW > 0 ? `<div style="width:${partialW}%;background:var(--orange);"></div>` : ''}
                  ${failW > 0 ? `<div style="width:${failW}%;background:var(--green);"></div>` : ''}
                  ${errorW > 0 ? `<div style="width:${errorW}%;background:var(--text2);opacity:0.4;"></div>` : ''}
                </div>
                <div style="width:30px;font-size:11px;color:var(--text2);text-align:right;">${v.pass}/${v.total}</div>
              </div>`;
            }).join('')}
          </div>` : "";

        // Results table
        const resultsHtml = liveResults.length > 0 ? `
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;">
            <div style="font-size:13px;font-weight:600;margin-bottom:12px;">Results <span style="color:var(--text2);font-weight:400">${liveResults.length} total</span></div>
            <table style="width:100%;border-collapse:collapse;font-size:12px;">
              <thead>
                <tr style="border-bottom:1px solid var(--border);text-align:left;">
                  <th style="padding:6px 8px;color:var(--text2);font-weight:500;">VERDICT</th>
                  <th style="padding:6px 8px;color:var(--text2);font-weight:500;">SEVERITY</th>
                  <th style="padding:6px 8px;color:var(--text2);font-weight:500;">CATEGORY</th>
                  <th style="padding:6px 8px;color:var(--text2);font-weight:500;">ATTACK</th>
                  <th style="padding:6px 8px;color:var(--text2);font-weight:500;">DETAILS</th>
                </tr>
              </thead>
              <tbody>
                ${liveResults.map(r => {
                  const verdictColors = { PASS: "var(--red)", FAIL: "var(--green)", PARTIAL: "var(--orange)", ERROR: "var(--text2)" };
                  const sevColors = { critical: "var(--critical)", high: "var(--high)", medium: "var(--medium)", low: "var(--low)" };
                  const catLabel = r.category.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                  const details = r.findings?.length > 0 ? r.findings[0].slice(0, 100) : (r.llmReasoning || "").slice(0, 100);
                  return `<tr style="border-bottom:1px solid var(--border);">
                    <td style="padding:6px 8px;"><span style="color:${verdictColors[r.verdict] || "var(--text2)"};font-weight:600;">${r.verdict}</span></td>
                    <td style="padding:6px 8px;"><span style="color:${sevColors[r.severity] || "var(--text2)"};text-transform:uppercase;font-size:10px;font-weight:600;">${r.severity}</span></td>
                    <td style="padding:6px 8px;color:var(--text2);">${esc(catLabel)}</td>
                    <td style="padding:6px 8px;">${esc(r.name)}</td>
                    <td style="padding:6px 8px;color:var(--text2);font-size:11px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(details)}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>` : "";

        // Progress log (collapsed when results exist)
        const progressLines = (data.progress || []).filter(p => p.phase !== "result").slice(-20);
        const progressHtml = progressLines
          .map(p => {
            const phaseColor = {config:"#58a6ff",analyze:"#58a6ff",static:"#58a6ff",auth:"#58a6ff",discovery:"#d29922",attacks:"#f85149",refine:"#d29922",report:"#3fb950"}[p.phase] || "#8b949e";
            return `<div style="font-size:12px;font-family:'SF Mono',Monaco,Consolas,monospace;padding:2px 0;color:var(--text);">
              <span style="color:${phaseColor}">[${esc(p.phase)}]</span> ${esc(p.message).slice(0, 150)}
            </div>`;
          }).join("");

        const errorHtml = data.error
          ? `<div style="background:rgba(248,81,73,0.1);border:1px solid var(--red);border-radius:8px;padding:12px;margin-bottom:16px;color:var(--red);font-size:13px;">${esc(data.error)}</div>`
          : "";

        app.innerHTML = `
          <div style="padding:4px 0;">
            ${errorHtml}
            ${summaryHtml}
            ${categoryHtml}
            ${resultsHtml}
            <details ${liveResults.length === 0 ? 'open' : ''} style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;">
              <summary style="font-size:13px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;">
                <span>Live Progress Log</span>
                <span style="font-size:11px;color:var(--text2);font-weight:400">${data.progressTotal || 0} events</span>
              </summary>
              <div style="max-height:300px;overflow-y:auto;background:var(--bg);border-radius:6px;padding:12px;margin-top:10px;">
                ${progressHtml || '<div style="color:var(--text2);font-size:12px;">Waiting for progress...</div>'}
              </div>
            </details>
          </div>
        `;
      }

      async function refreshActiveRuns() {
        try {
          const resp = await fetch("/api/runs");
          const runs = await resp.json();
          for (const run of runs) {
            if (run.status === "queued" || run.status === "running" || run.status === "error") {
              // Fetch full progress for active/recent runs
              try {
                const fullResp = await fetch(`/api/run/${run.runId}?since=0`);
                const fullData = await fullResp.json();
                runDataCache.set(run.runId, fullData);
              } catch {
                runDataCache.set(run.runId, { ...run, progress: [] });
              }
              if (run.status === "queued" || run.status === "running") {
                pollRun(run.runId);
              }
            }
          }
          renderSidebarRuns();
        } catch {
          // ignore
        }
      }

      async function cancelRun(runId) {
        try {
          const resp = await fetch(`/api/run/${runId}`, { method: "DELETE" });
          const data = await resp.json();
          if (resp.ok) {
            const cached = runDataCache.get(runId);
            if (cached) {
              cached.status = data.status === "cancelling" ? "error" : data.status;
              cached.error = "Cancelled by user";
            }
            renderSidebarRuns();
            if (selectedRunId === runId && cached) renderRunMainPanel(runId, cached);
          }
        } catch {
          // ignore
        }
      }

      // Load active runs on page load
      refreshActiveRuns();
    </script>
  </body>
</html>
