<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Team Dashboard</title>
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface2: #21262d;
        --border: #30363d;
        --text: #e6edf3;
        --text2: #8b949e;
        --accent: #58a6ff;
        --red: #f85149;
        --orange: #d29922;
        --green: #3fb950;
        --purple: #bc8cff;
        --critical: #f85149;
        --high: #db6d28;
        --medium: #d29922;
        --low: #8b949e;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }

      /* Layout — sidebar + main */
      .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        height: 100vh;
      }
      @media (max-width: 1000px) {
        .layout {
          grid-template-columns: 260px 1fr;
        }
      }

      /* Sidebar */
      .sidebar {
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-header {
        padding: 16px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-header h1 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .sidebar-search {
        width: 100%;
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 12px;
      }
      .sidebar-search::placeholder {
        color: var(--text2);
      }

      /* Trend chart */
      .trend-section {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }
      .trend-label {
        font-size: 11px;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      .trend-canvas {
        width: 100%;
        height: 48px;
      }

      /* Report list */
      .report-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0;
      }
      .report-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        cursor: pointer;
        border-left: 3px solid transparent;
        transition: background 0.15s;
      }
      .report-item:hover {
        background: var(--surface2);
      }
      .report-item.active {
        background: rgba(88, 166, 255, 0.08);
        border-left-color: var(--accent);
      }
      .report-item-score {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
        border: 2px solid;
      }
      .report-item-info {
        flex: 1;
        min-width: 0;
      }
      .report-item-date {
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .report-item-target {
        font-size: 11px;
        color: var(--text2);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .report-item-stats {
        font-size: 10px;
        color: var(--text2);
        display: flex;
        gap: 6px;
        margin-top: 2px;
      }
      .report-item-stats .ri-vuln {
        color: var(--red);
      }
      .report-item-stats .ri-safe {
        color: var(--green);
      }

      /* Pagination */
      .sidebar-pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        border-top: 1px solid var(--border);
        font-size: 12px;
        color: var(--text2);
      }
      .sidebar-pagination button {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 10px;
        cursor: pointer;
        font-size: 11px;
      }
      .sidebar-pagination button:disabled {
        opacity: 0.4;
        cursor: default;
      }

      /* Main area */
      .main {
        overflow-y: auto;
      }
      .main-header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 12px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .main-header .meta {
        margin-left: auto;
        color: var(--text2);
        font-size: 13px;
        display: flex;
        gap: 16px;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px;
      }
      .loading {
        text-align: center;
        padding: 80px;
        color: var(--text2);
        font-size: 16px;
      }

      /* Score Banner */
      .score-banner {
        display: flex;
        align-items: center;
        gap: 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px 32px;
        margin-bottom: 24px;
      }
      .score-ring {
        position: relative;
        width: 120px;
        height: 120px;
        flex-shrink: 0;
      }
      .score-ring svg {
        transform: rotate(-90deg);
      }
      .score-ring .value {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        font-weight: 700;
      }
      .score-label {
        font-size: 13px;
        color: var(--text2);
        text-align: center;
        margin-top: 4px;
      }
      .verdict-legend {
        margin-top: 16px;
        padding: 12px 14px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .verdict-legend-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text2);
        margin-bottom: 8px;
      }
      .verdict-legend-items {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .verdict-legend-item {
        font-size: 12px;
        color: var(--text);
      }

      /* Stat Cards */
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        flex: 1;
      }
      .stat {
        background: var(--surface2);
        border-radius: 8px;
        padding: 16px;
        text-align: center;
      }
      .stat .num {
        font-size: 28px;
        font-weight: 700;
      }
      .stat .label {
        font-size: 12px;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 2px;
      }
      .stat.pass .num {
        color: var(--red);
      }
      .stat.fail .num {
        color: var(--green);
      }
      .stat.partial .num {
        color: var(--orange);
      }
      .stat.error .num {
        color: var(--text2);
      }
      .stat.total .num {
        color: var(--accent);
      }

      /* Section */
      .section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px 24px;
        margin-bottom: 24px;
      }
      .section h2 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .section h2 .badge {
        font-size: 12px;
        background: var(--surface2);
        padding: 2px 8px;
        border-radius: 10px;
        color: var(--text2);
        font-weight: 400;
      }

      /* Category chart */
      .cat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      @media (max-width: 900px) {
        .cat-grid {
          grid-template-columns: 1fr;
        }
      }
      .cat-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
      }
      .cat-name {
        width: 220px;
        font-size: 12px;
        color: var(--text2);
        text-align: right;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex-shrink: 0;
      }
      .cat-bar-bg {
        flex: 1;
        height: 20px;
        background: var(--surface2);
        border-radius: 4px;
        overflow: hidden;
        position: relative;
        display: flex;
      }
      .cat-bar-pass {
        background: var(--red);
        height: 100%;
        transition: width 0.4s ease;
      }
      .cat-bar-partial {
        background: var(--orange);
        height: 100%;
        transition: width 0.4s ease;
      }
      .cat-bar-fail {
        background: var(--green);
        height: 100%;
        transition: width 0.4s ease;
      }
      .cat-count {
        font-size: 11px;
        color: var(--text2);
        width: 70px;
        text-align: left;
        flex-shrink: 0;
      }

      /* Findings table */
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        text-align: left;
        font-size: 12px;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
      }
      td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        vertical-align: top;
      }
      tr:hover td {
        background: rgba(88, 166, 255, 0.04);
      }
      .sev {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .sev-critical {
        background: rgba(248, 81, 73, 0.15);
        color: var(--critical);
      }
      .sev-high {
        background: rgba(219, 109, 40, 0.15);
        color: var(--high);
      }
      .sev-medium {
        background: rgba(210, 153, 34, 0.15);
        color: var(--medium);
      }
      .sev-low {
        background: rgba(139, 148, 158, 0.15);
        color: var(--low);
      }

      /* Expandable rows */
      .expand-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--text2);
        border-radius: 4px;
        padding: 2px 8px;
        cursor: pointer;
        font-size: 11px;
      }
      .expand-btn:hover {
        color: var(--text);
        border-color: var(--text2);
      }
      .detail-row td {
        padding: 0;
      }
      .detail-content {
        padding: 12px 24px;
        background: var(--bg);
        max-height: 400px;
        overflow: auto;
      }
      .detail-content pre {
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-all;
        color: var(--text2);
      }
      .detail-content .finding-tag {
        display: inline-block;
        background: rgba(248, 81, 73, 0.1);
        color: var(--red);
        padding: 2px 8px;
        border-radius: 4px;
        margin: 2px;
        font-size: 11px;
      }
      .detail-content .file-tag {
        display: inline-block;
        background: rgba(88, 166, 255, 0.12);
        color: var(--accent);
        padding: 2px 8px;
        border-radius: 4px;
        margin: 2px;
        font-size: 11px;
      }

      /* Round tabs */
      .round-tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .round-tab {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text2);
        padding: 6px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      .round-tab.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      /* Static analysis */
      .static-item {
        display: flex;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
        align-items: flex-start;
      }
      .static-item:last-child {
        border-bottom: none;
      }
      .static-file {
        font-family: monospace;
        font-size: 12px;
        color: var(--accent);
        min-width: 200px;
      }
      .static-desc {
        font-size: 13px;
        color: var(--text);
      }
      .static-line {
        color: var(--text2);
        font-size: 12px;
      }

      /* Strategy breakdown */
      .strategy-chip {
        display: inline-block;
        background: var(--surface2);
        border: 1px solid var(--border);
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 11px;
        margin: 2px;
        color: var(--text2);
      }
      .strategy-chip .s-count {
        color: var(--red);
        font-weight: 600;
        margin-left: 4px;
      }

      /* Verdict badge */
      .verdict {
        font-weight: 600;
        font-size: 12px;
      }
      .verdict-PASS {
        color: var(--red);
      }
      .verdict-FAIL {
        color: var(--green);
      }
      .verdict-PARTIAL {
        color: var(--orange);
      }
      .verdict-ERROR {
        color: var(--text2);
      }

      /* Filter bar */
      .filter-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      .filter-bar label {
        font-size: 12px;
        color: var(--text2);
      }
      .filter-bar select,
      .filter-bar input {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 12px;
      }
      .filter-bar input {
        width: 200px;
      }

      /* Detail grid for findings */
      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 900px) {
        .detail-grid {
          grid-template-columns: 1fr;
        }
      }
      .detail-col {
        min-width: 0;
      }
      .detail-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--accent);
        margin-bottom: 6px;
      }
      .detail-pre {
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--text);
        background: var(--surface2);
        border-radius: 6px;
        padding: 10px 12px;
        max-height: 300px;
        overflow: auto;
      }
      .detail-reasoning {
        border-left: 3px solid var(--purple);
      }

      /* OWASP Compliance */
      .owasp-trigger {
        text-align: center;
        padding: 32px;
      }
      .owasp-btn {
        background: linear-gradient(135deg, var(--accent), var(--purple));
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 12px 28px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .owasp-btn:hover {
        opacity: 0.85;
      }
      .owasp-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .owasp-progress {
        margin-top: 12px;
        font-size: 12px;
        color: var(--text2);
      }
      .owasp-progress-bar {
        height: 4px;
        background: var(--surface2);
        border-radius: 2px;
        margin-top: 6px;
        overflow: hidden;
      }
      .owasp-progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 2px;
        transition: width 0.3s;
      }
      .compliance-grid {
        display: grid;
        gap: 10px;
      }
      .compliance-card {
        background: var(--surface2);
        border-radius: 8px;
        border-left: 4px solid var(--border);
        overflow: hidden;
      }
      .compliance-card.status-vulnerable {
        border-left-color: var(--red);
      }
      .compliance-card.status-at_risk {
        border-left-color: var(--orange);
      }
      .compliance-card.status-secure {
        border-left-color: var(--green);
      }
      .compliance-card.status-not_tested {
        border-left-color: var(--text2);
        opacity: 0.6;
      }
      .compliance-card.status-error {
        border-left-color: var(--text2);
      }
      .compliance-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        cursor: pointer;
        user-select: none;
      }
      .compliance-header:hover {
        background: rgba(88, 166, 255, 0.04);
      }
      .compliance-code {
        font-weight: 700;
        font-size: 12px;
        color: var(--accent);
        min-width: 90px;
        flex-shrink: 0;
      }
      .compliance-title {
        font-size: 13px;
        flex: 1;
      }
      .compliance-meta {
        font-size: 11px;
        color: var(--text2);
        min-width: 100px;
        text-align: right;
        flex-shrink: 0;
      }
      .compliance-meta .c-vuln {
        color: var(--red);
        font-weight: 600;
      }
      .compliance-meta .c-partial {
        color: var(--orange);
      }
      .compliance-meta .c-safe {
        color: var(--green);
      }
      .compliance-status {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        padding: 3px 10px;
        border-radius: 10px;
        white-space: nowrap;
      }
      .compliance-status.vulnerable {
        background: rgba(248, 81, 73, 0.15);
        color: var(--red);
      }
      .compliance-status.at_risk {
        background: rgba(210, 153, 34, 0.15);
        color: var(--orange);
      }
      .compliance-status.secure {
        background: rgba(63, 185, 80, 0.15);
        color: var(--green);
      }
      .compliance-status.not_tested {
        background: rgba(139, 148, 158, 0.15);
        color: var(--text2);
      }
      .compliance-status.error {
        background: rgba(139, 148, 158, 0.15);
        color: var(--text2);
      }
      .compliance-expand {
        font-size: 12px;
        color: var(--text2);
        width: 20px;
        text-align: center;
      }
      .compliance-body {
        display: none;
        padding: 0 16px 16px;
        border-top: 1px solid var(--border);
      }
      .compliance-body.open {
        display: block;
      }
      .compliance-summary-text {
        font-size: 13px;
        color: var(--text);
        margin: 12px 0;
        line-height: 1.6;
      }
      .compliance-details {
        font-size: 12px;
        color: var(--text2);
        white-space: pre-wrap;
        word-break: break-word;
        background: var(--bg);
        border-radius: 6px;
        padding: 12px;
        max-height: 300px;
        overflow: auto;
        margin: 8px 0;
        line-height: 1.6;
      }
      .compliance-recs {
        margin: 8px 0;
        padding-left: 20px;
      }
      .compliance-recs li {
        font-size: 12px;
        color: var(--text);
        margin: 4px 0;
        line-height: 1.5;
      }
      .compliance-findings {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 8px;
      }
      .compliance-finding-tag {
        display: inline-block;
        background: rgba(248, 81, 73, 0.1);
        color: var(--red);
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
      }
      .owasp-summary-bar {
        display: flex;
        gap: 16px;
        margin-bottom: 12px;
      }
      .owasp-summary-item {
        text-align: center;
        padding: 8px 16px;
        background: var(--bg);
        border-radius: 6px;
      }
      .owasp-summary-item .os-num {
        font-size: 22px;
        font-weight: 700;
      }
      .owasp-summary-item .os-label {
        font-size: 11px;
        color: var(--text2);
        text-transform: uppercase;
      }

      .empty {
        color: var(--text2);
        text-align: center;
        padding: 32px;
      }

      /* Two column layout */
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }
      @media (max-width: 900px) {
        .two-col {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar: Report Browser -->
      <div class="sidebar">
        <div class="sidebar-header">
          <h1>Red Team Dashboard</h1>
          <input
            class="sidebar-search"
            id="reportSearch"
            placeholder="Search reports..."
          />
        </div>
        <div class="trend-section">
          <div class="trend-label">Score Trend</div>
          <canvas class="trend-canvas" id="trendCanvas"></canvas>
        </div>
        <div class="report-list" id="reportList">
          <div class="loading" style="padding: 24px">Loading...</div>
        </div>
        <div class="sidebar-pagination" id="pagination"></div>
      </div>

      <!-- Main content -->
      <div class="main">
        <div class="main-header">
          <span
            id="metaTarget"
            style="font-weight: 600; font-size: 14px"
          ></span>
          <div class="meta">
            <span id="metaDate"></span>
            <span id="metaScore"></span>
          </div>
        </div>
        <div class="container" id="app">
          <div class="loading">Select a report from the sidebar</div>
        </div>
      </div>
    </div>

    <script>
      const $ = (s) => document.querySelector(s);
      const app = $("#app");
      let report = null;
      let activeRound = 0;
      let currentFile = null;
      let reportsMeta = [];
      let trendData = [];
      let currentPage = 1;
      let totalPages = 1;
      let searchTerm = "";
      let searchTimeout = null;

      // ── Bootstrap ──
      (async () => {
        await loadReportsMeta();
      })();

      // Search with debounce
      $("#reportSearch").addEventListener("input", (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          searchTerm = e.target.value;
          currentPage = 1;
          loadReportsMeta();

        const res = await fetch(`/api/reports-meta?${params}`);

        reportsMeta = data.items || [];
        totalPages = data.totalPages || 1;
        trendData = data.trend || [];

        renderPagination();

        // Auto-select first report if none selected
        if (!currentFile && reportsMeta.length > 0) {
          selectReport(reportsMeta[0].filename);

      function scoreColor(score) {
        return score >= 70
          ? "var(--green)"

      function renderTrend() {
        const canvas = $("#trendCanvas");
        const ctx = canvas.getContext("2d");
        const dpr = window.devicePixelRatio || 1;
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, w, h);

        if (trendData.length < 2) {
          ctx.fillStyle = "var(--text2)";
          ctx.font = "11px sans-serif";
          ctx.fillText(trendData.length ? "1 run" : "No data", 4, h / 2 + 4);
          return;
        }

        const scores = trendData.map((d) => d.score);
        const min = Math.min(...scores, 0);
        const max = Math.max(...scores, 100);
        const range = max - min || 1;
        const pad = 2;

        // Draw grid lines
        ctx.strokeStyle = "#30363d";
        ctx.lineWidth = 0.5;
        for (const y of [0, 25, 50, 75, 100]) {
          const py = h - pad - ((y - min) / range) * (h - pad * 2);
          ctx.beginPath();
          ctx.moveTo(0, py);
          ctx.lineTo(w, py);
          ctx.stroke();
        }

        // Draw line
        ctx.strokeStyle = "#58a6ff";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        scores.forEach((s, i) => {
          const x = (i / (scores.length - 1)) * (w - pad * 2) + pad;
          const y = h - pad - ((s - min) / range) * (h - pad * 2);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();

        // Draw fill
        const lastX =
          ((scores.length - 1) / (scores.length - 1)) * (w - pad * 2) + pad;
        ctx.lineTo(lastX, h);
        ctx.lineTo(pad, h);
        ctx.closePath();
        ctx.fillStyle = "rgba(88,166,255,0.08)";
        ctx.fill();

        // Draw dots for latest and lowest
        const latestIdx = scores.length - 1;
        const lowestIdx = scores.indexOf(Math.min(...scores));
        for (const idx of [latestIdx, lowestIdx]) {
          const x = (idx / (scores.length - 1)) * (w - pad * 2) + pad;
          const y = h - pad - ((scores[idx] - min) / range) * (h - pad * 2);
          ctx.fillStyle = scoreColor(scores[idx]);
          ctx.beginPath();
          ctx.arc(x, y, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function fmtCat(c) {
        return c.replace(/_/g, " ").replace(/\b\w/g, (l) => l.toUpperCase());

      function renderCategories() {
        const bc = report.summary.byCategory;
        const cats = Object.entries(bc).sort(
          (a, b) => b[1].passed - a[1].passed,

        const el = $("#catChart");

        // Compute partial counts from round results
        const partialByCat = {};
        for (const round of report.rounds) {
          for (const r of round.results) {
            if (r.verdict === "PARTIAL") {
              partialByCat[r.attack.category] =
                (partialByCat[r.attack.category] || 0) + 1;
            }
          }
        }

        el.innerHTML =
          '<div class="cat-grid">' +
          cats
            .map(([cat, data]) => {
              const partial = partialByCat[cat] || 0;
              const fail = data.total - data.passed - partial;
              const passW = data.total ? (data.passed / data.total) * 100 : 0;
              const partialW = data.total ? (partial / data.total) * 100 : 0;
              const failW = data.total ? (fail / data.total) * 100 : 0;
              return `<div class="cat-row">
      <div class="cat-name" title="${fmtCat(cat)}">${fmtCat(cat)}</div>
      <div class="cat-bar-bg">
        <div class="cat-bar-pass" style="width:${passW}%"></div>

      function renderStrategies() {
        const stratCounts = {};
        for (const round of report.rounds) {
          for (const r of round.results) {
            if (r.verdict === "PASS" && r.attack.strategyName) {
              const name = r.attack.strategyName;
              stratCounts[name] = (stratCounts[name] || 0) + 1;
            }
          }
        }
        const sorted = Object.entries(stratCounts)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 20);
        const el = $("#strategySection");
        if (!sorted.length) {
          el.innerHTML = '<div class="empty">No strategy data available</div>';

        el.innerHTML = sorted
          .map(

      let owaspResults = [];
      let owaspAnalyzing = false;

      async function runOwaspAnalysis() {
        if (owaspAnalyzing || !reportSelect.value) return;
        owaspAnalyzing = true;

        const btn = $("#owaspAnalyzeBtn");
        const progress = $("#owaspProgress");
        const progressText = $("#owaspProgressText");
        const progressFill = $("#owaspProgressFill");

        // Reset everything for a fresh run
        owaspResults = [];
        $("#owaspResults").style.display = "none";
        $("#owaspLlm").innerHTML = "";
        $("#owaspAgentic").innerHTML = "";
        $("#owaspLlmSummary").innerHTML = "";
        $("#owaspAgenticSummary").innerHTML = "";

        btn.disabled = true;
        btn.textContent = "Analyzing with LLM...";
        progress.style.display = "block";
        progressFill.style.width = "0%";

        const totalItems = 20; // 10 LLM + 10 Agentic
        let completed = 0;

        try {
          const res = await fetch("/api/owasp-analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ reportFile: reportSelect.value }),
          });

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
              if (!line.trim()) continue;
              try {
                const item = JSON.parse(line);
                owaspResults.push(item);
                completed++;
                progressText.textContent = `Analyzing ${item.code} — ${item.title}... (${completed}/${totalItems})`;
                progressFill.style.width = `${(completed / totalItems) * 100}%`;
                renderOwaspResults();
              } catch {}
            }
          }

          // Process remaining buffer
          if (buffer.trim()) {
            try {
              owaspResults.push(JSON.parse(buffer));
              renderOwaspResults();
            } catch {}
          }

          btn.textContent = "Re-run OWASP Analysis";
          progressText.textContent = `Analysis complete — ${owaspResults.length} item${owaspResults.length !== 1 ? "s" : ""} analyzed`;
          progressFill.style.width = "100%";
        } catch (err) {
          progressText.textContent = `Error: ${err.message}`;
          btn.textContent = "Retry OWASP Analysis";
        }

        btn.disabled = false;
        owaspAnalyzing = false;
      }

      function renderOwaspResults() {
        const resultsEl = $("#owaspResults");
        resultsEl.style.display = "block";

        const llmItems = owaspResults.filter((r) =>
          r.framework.includes("LLM"),
        );
        const agenticItems = owaspResults.filter((r) =>
          r.framework.includes("Agentic"),
        );

        renderOwaspSummaryBar($("#owaspLlmSummary"), llmItems);
        renderOwaspSummaryBar($("#owaspAgenticSummary"), agenticItems);
        renderOwaspCards($("#owaspLlm"), llmItems);
        renderOwaspCards($("#owaspAgentic"), agenticItems);
      }

      function renderOwaspSummaryBar(el, items) {
        if (!items.length) {
          el.innerHTML = "";
          return;

        const vuln = items.filter((i) => i.status === "vulnerable").length;
        const risk = items.filter((i) => i.status === "at_risk").length;
        const secure = items.filter((i) => i.status === "secure").length;
        const notTested = items.filter((i) => i.status === "not_tested").length;
        el.innerHTML = `
          <div class="owasp-summary-item"><div class="os-num" style="color:var(--red)">${vuln}</div><div class="os-label">Vulnerable</div></div>
          <div class="owasp-summary-item"><div class="os-num" style="color:var(--orange)">${risk}</div><div class="os-label">At Risk</div></div>
          <div class="owasp-summary-item"><div class="os-num" style="color:var(--green)">${secure}</div><div class="os-label">Secure</div></div>
          <div class="owasp-summary-item"><div class="os-num" style="color:var(--text2)">${notTested}</div><div class="os-label">Not Tested</div></div>
        `;
      }

      function renderOwaspCards(el, items) {
        el.innerHTML = items
          .map(
            (item, i) => `
          <div class="compliance-card status-${item.status}">
            <div class="compliance-header" onclick="toggleOwaspCard(this)">

              </span>

      function toggleOwaspCard(header) {
        const body = header.nextElementSibling;
        const expand = header.querySelector(".compliance-expand");
        if (body.classList.contains("open")) {
          body.classList.remove("open");
          expand.textContent = "+";
        } else {
          body.classList.add("open");
          expand.textContent = "−";
        }
      }

      function fmtStatus(s) {
        return s === "at_risk"
          ? "At Risk"
          : s === "not_tested"
            ? "Not Tested"
            : s === "error"
              ? "Error"
              : s.charAt(0).toUpperCase() + s.slice(1);
      }

      function buildFindingsIndex() {
        // Map attack name+category to its full result for prompt/response/reasoning lookup
        if (report._findingsIndex) return report._findingsIndex;
        const idx = {};
        for (const round of report.rounds) {
          for (const r of round.results) {
            const key = r.attack.name + "|" + r.attack.category;
            if (!idx[key]) idx[key] = r;
          }
        }
        report._findingsIndex = idx;
        return idx;
      }

      function buildResultRows() {
        if (report._resultRows) return report._resultRows;
        const rows = [];
        report.rounds.forEach((round) => {
          round.results.forEach((result) => {
            rows.push({
              round: round.round,
              verdict: result.verdict,
              severity: result.attack.severity,
              category: result.attack.category,
              attack: result.attack.name,
              description:
                result.findings?.join("; ") || result.attack.description || "",
              strategyName: result.attack.strategyName || "",
              affectedFiles:
                result.affectedFiles ||
                report.affectedFiles?.[result.attack.category] ||
                [],
              result,
            });
          });
        });
        report._resultRows = rows;
        return rows;
      }

      function extractPrompt(result) {
        if (!result) return "";
        const msg =
          result.attack.payload?.message || result.attack.payload?.prompt || "";
        return typeof msg === "string" ? msg : JSON.stringify(msg);
      }

      function extractResponse(result) {
        if (!result || !result.responseBody) return "";
        const body = result.responseBody;
        if (typeof body === "string") return body;
        if (body.response)
          return typeof body.response === "string"
            ? body.response
            : JSON.stringify(body.response);
        return JSON.stringify(body);
      }

      function formatAffectedFiles(files) {
        if (!Array.isArray(files) || !files.length) return "";
        return files
          .map((af) => {
            const loc = af?.line ? `${af.file}:${af.line}` : af?.file;
            const reason = af?.reason ? ` — ${af.reason}` : "";
            return `<span class="file-tag">${esc(loc || "unknown")}${esc(reason)}</span>`;
          })
          .join("");
      }

      function formatExecutionTrace(trace) {
        if (!trace) return "";
        const transcript = Array.isArray(trace.transcript)
          ? trace.transcript
              .map((event, idx) => {
                const label =
                  event.direction === "client->server"
                    ? "client → server"
                    : event.direction === "server->client"
                      ? "server → client"
                      : "server notify";
                const method = event.method ? ` (${event.method})` : "";
                const payload = esc(
                  typeof event.payload === "string"
                    ? event.payload
                    : JSON.stringify(event.payload, null, 2),
                );
                return `<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">${idx + 1}. ${label}${method}</div><pre class="detail-pre">${payload}</pre></div>`;
              })
              .join("")
          : "";
        const meta = [
          trace.transport
            ? `<span><strong>Transport:</strong> ${esc(trace.transport)}</span>`
            : "",
          trace.operation
            ? `<span><strong>Operation:</strong> ${esc(trace.operation)}</span>`
            : "",
          trace.serverName
            ? `<span><strong>Server:</strong> ${esc(trace.serverName)}</span>`
            : "",
          trace.protocolVersion
            ? `<span><strong>Protocol:</strong> ${esc(trace.protocolVersion)}</span>`
            : "",
        ]
          .filter(Boolean)
          .join("");
        const stderr = trace.stderr
          ? `<div style="margin-top:12px"><div class="detail-label">MCP STDERR</div><pre class="detail-pre">${esc(trace.stderr)}</pre></div>`
          : "";
        return `<div style="margin-top:12px"><div class="detail-label">MCP Execution Trace</div>
          ${
            meta
              ? `<div style="margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap;color:var(--text2);font-size:12px">${meta}</div>`
              : ""
          }
          ${transcript || '<div style="color:var(--text2);font-size:12px">No transcript events captured</div>'}
          ${stderr}
        </div>`;
      }

      function renderFindings() {
        const verdict = $("#filterVerdict")?.value || "";
        const sev = $("#filterSev")?.value || "";
        const cat = $("#filterCat")?.value || "";
        const search = ($("#filterSearch")?.value || "").toLowerCase();

        let findings = buildResultRows();
        if (verdict) findings = findings.filter((f) => f.verdict === verdict);
        if (sev) findings = findings.filter((f) => f.severity === sev);
        if (cat) findings = findings.filter((f) => f.category === cat);
        if (search)
          findings = findings.filter(
            (f) =>
              f.description.toLowerCase().includes(search) ||
              f.attack.toLowerCase().includes(search) ||
              f.category.toLowerCase().includes(search) ||
              (f.strategyName || "").toLowerCase().includes(search) ||
              (f.verdict || "").toLowerCase().includes(search),
          );

        const el = $("#findingsTable");
        if (!findings.length) {
          el.innerHTML =
            '<div class="empty">No results match the filters</div>';
          return;
        }

        el.innerHTML = `<table>
    <thead><tr><th>Verdict</th><th>Severity</th><th>Category</th><th>Attack</th><th>Details</th><th>Strategy</th><th style="width:50px"></th></tr></thead>
    <tbody id="findingsRows"></tbody>
  </table>`;

        const tbody = $("#findingsRows");
        findings.slice(0, 200).forEach((f, i) => {
          const result = f.result;
          const prompt = extractPrompt(result);
          const response = extractResponse(result);
          const reasoning = result?.llmReasoning || "";
          const affectedFilesHtml = formatAffectedFiles(f.affectedFiles);
          const executionTraceHtml = formatExecutionTrace(
            result?.executionTrace,
          );

          const tr = document.createElement("tr");
          tr.innerHTML = `
      <td><span class="verdict verdict-${f.verdict}">${esc(f.verdict)}</span></td>
      <td><span class="sev sev-${f.severity}">${f.severity}</span></td>
      <td>${fmtCat(f.category)}</td>
      <td>${esc(f.attack)}</td>
      <td>${esc(f.description)}</td>
      <td>${f.strategyName ? esc(f.strategyName) : '<span style="color:var(--text2)">-</span>'}</td>
      <td><button class="expand-btn" data-fidx="${i}">+</button></td>`;
          tbody.appendChild(tr);

          const detailTr = document.createElement("tr");
          detailTr.classList.add("detail-row");
          detailTr.style.display = "none";
          detailTr.innerHTML = `<td colspan="7"><div class="detail-content">
      <div style="margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap;color:var(--text2);font-size:12px">
        <span><strong>Round:</strong> ${f.round}</span>
        <span><strong>Verdict:</strong> <span class="verdict verdict-${f.verdict}">${esc(f.verdict)}</span></span>
        <span><strong>Status:</strong> ${result?.statusCode ?? "-"}</span>
        <span><strong>Response Time:</strong> ${result?.responseTimeMs ?? "-"} ms</span>
      </div>
      <div class="detail-grid">
        <div class="detail-col">
          <div class="detail-label">Prompt</div>
          <pre class="detail-pre">${esc(prompt || "(no prompt)")}</pre>
        </div>
        <div class="detail-col">
          <div class="detail-label">Response</div>
          <pre class="detail-pre">${esc((response || "(no response)").slice(0, 2000))}${response.length > 2000 ? "\n... (truncated)" : ""}</pre>
        </div>
      </div>
      ${reasoning ? `<div style="margin-top:12px"><div class="detail-label">LLM Reasoning</div><pre class="detail-pre detail-reasoning">${esc(reasoning)}</pre></div>` : ""}
      ${result?.findings?.length ? `<div style="margin-top:12px"><div class="detail-label">Verdict Details</div><div>${result.findings.map((fd) => `<span class="finding-tag">${esc(fd)}</span>`).join("")}</div></div>` : ""}
      ${affectedFilesHtml ? `<div style="margin-top:12px"><div class="detail-label">Affected Files</div><div>${affectedFilesHtml}</div></div>` : ""}
      ${executionTraceHtml}
      ${
        result?.policyUsed
          ? `<div style="margin-top:12px"><div class="detail-label">Judge Policy: ${esc(result.policyUsed.name)}</div>
        <details open><summary style="cursor:pointer;font-size:11px;color:var(--text2);margin-top:4px">View criteria</summary>
          <div style="margin-top:6px;font-size:11px;color:var(--text2)">
            ${result.policyUsed.pass_criteria?.length ? `<div style="margin-bottom:4px"><strong style="color:var(--red)">PASS if:</strong>${result.policyUsed.pass_criteria.map((c) => `<div style="margin-left:12px">• ${esc(c)}</div>`).join("")}</div>` : ""}
            ${result.policyUsed.fail_criteria?.length ? `<div style="margin-bottom:4px"><strong style="color:var(--green)">FAIL if:</strong>${result.policyUsed.fail_criteria.map((c) => `<div style="margin-left:12px">• ${esc(c)}</div>`).join("")}</div>` : ""}
            ${result.policyUsed.partial_criteria?.length ? `<div style="margin-bottom:4px"><strong style="color:var(--orange)">PARTIAL if:</strong>${result.policyUsed.partial_criteria.map((c) => `<div style="margin-left:12px">• ${esc(c)}</div>`).join("")}</div>` : ""}
            ${result.policyUsed.instructions ? `<div style="margin-top:4px;font-style:italic">${esc(result.policyUsed.instructions)}</div>` : ""}
          </div>
        </details>
      </div>`
          : ""
      }
    </div></td>`;
          tbody.appendChild(detailTr);
        });

        tbody.addEventListener("click", (e) => {
          const btn = e.target.closest(".expand-btn");
          if (!btn) return;
          const idx = parseInt(btn.dataset.fidx);
          const rows = tbody.querySelectorAll(".detail-row");
          const row = rows[idx];
          if (row.style.display === "none") {
            row.style.display = "";
            btn.textContent = "-";
          } else {
            row.style.display = "none";
            btn.textContent = "+";
          }
        });
      }

      function renderRoundTabs() {
        const el = $("#roundTabs");
        const tabs = [{ label: "All Rounds", value: 0 }];
        for (const r of report.rounds)
          tabs.push({ label: `Round ${r.round}`, value: r.round });
        el.innerHTML = tabs
          .map(
            (t) =>
              `<div class="round-tab ${t.value === activeRound ? "active" : ""}" data-round="${t.value}">${t.label}</div>`,
          )
          .join("");
        el.querySelectorAll(".round-tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            activeRound = parseInt(tab.dataset.round);
            renderRoundTabs();
            renderRoundDetail();
          });
        });
      }

      function renderRoundDetail() {
        let results = [];
        if (activeRound === 0) {
          for (const r of report.rounds) results.push(...r.results);
        } else {
          const round = report.rounds.find((r) => r.round === activeRound);
          if (round) results = round.results;
        }

        // Sort: PASS first, then PARTIAL, then ERROR, then FAIL
        const verdictOrder = { PASS: 0, PARTIAL: 1, ERROR: 2, FAIL: 3 };
        results.sort(
          (a, b) =>
            (verdictOrder[a.verdict] ?? 9) - (verdictOrder[b.verdict] ?? 9),
        );

        const el = $("#roundDetail");
        if (!results.length) {
          el.innerHTML = '<div class="empty">No results in this round</div>';
          return;
        }

        el.innerHTML = `
    <div style="margin-bottom:8px;color:var(--text2);font-size:12px;">${results.length} attacks &middot;
      <span style="color:var(--red)">${results.filter((r) => r.verdict === "PASS").length} PASS</span> &middot;
      <span style="color:var(--orange)">${results.filter((r) => r.verdict === "PARTIAL").length} PARTIAL</span> &middot;
      <span style="color:var(--green)">${results.filter((r) => r.verdict === "FAIL").length} FAIL</span> &middot;
      <span>${results.filter((r) => r.verdict === "ERROR").length} ERROR</span>
    </div>
    <table>
      <thead><tr><th style="width:80px">Verdict</th><th style="width:70px">Sev</th><th>Attack</th><th>Category</th><th style="width:60px">Status</th><th style="width:60px">Time</th><th style="width:50px"></th></tr></thead>
      <tbody id="roundRows"></tbody>
    </table>`;

        const tbody = $("#roundRows");
        results.forEach((r, i) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
      <td><span class="verdict verdict-${r.verdict}">${r.verdict}</span></td>
      <td><span class="sev sev-${r.attack.severity}">${r.attack.severity}</span></td>
      <td title="${esc(r.attack.description)}">${esc(r.attack.name)}</td>
      <td>${fmtCat(r.attack.category)}</td>
      <td>${r.statusCode}</td>
      <td>${r.responseTimeMs}ms</td>
      <td><button class="expand-btn" data-idx="${i}">+</button></td>`;
          tbody.appendChild(tr);

          // Hidden detail row
          const detailTr = document.createElement("tr");
          detailTr.classList.add("detail-row");
          detailTr.style.display = "none";
          const roundAffectedFilesHtml = formatAffectedFiles(r.affectedFiles);
          const roundExecutionTraceHtml = formatExecutionTrace(
            r.executionTrace,
          );
          detailTr.innerHTML = `<td colspan="7"><div class="detail-content">
      <div style="margin-bottom:8px">
        <strong>Payload:</strong>
        <pre>${esc(JSON.stringify(r.attack.payload, null, 2))}</pre>
      </div>
      ${r.findings.length ? `<div style="margin-bottom:8px"><strong>Findings:</strong><br>${r.findings.map((f) => `<span class="finding-tag">${esc(f)}</span>`).join("")}</div>` : ""}
      ${roundAffectedFilesHtml ? `<div style="margin-bottom:8px"><strong>Affected Files:</strong><br>${roundAffectedFilesHtml}</div>` : ""}
      ${r.llmReasoning ? `<div style="margin-bottom:8px"><strong>LLM Reasoning:</strong><pre>${esc(r.llmReasoning)}</pre></div>` : ""}
      <div style="margin-bottom:8px">
        <strong>Response:</strong>
        <pre>${esc(JSON.stringify(r.responseBody, null, 2).slice(0, 3000))}${JSON.stringify(r.responseBody, null, 2).length > 3000 ? "\n... (truncated)" : ""}</pre>
      </div>
      ${roundExecutionTraceHtml}
      ${r.attack.strategyName ? `<div style="margin-bottom:8px"><strong>Strategy:</strong> ${esc(r.attack.strategyName)} (#${r.attack.strategyId})</div>` : ""}
      ${r.attack.steps ? `<div style="margin-bottom:8px"><strong>Multi-turn:</strong> Step ${r.stepIndex ?? 0 + 1} of ${r.totalSteps ?? r.attack.steps.length + 1}</div>` : ""}
      ${
        r.policyUsed
          ? `<div style="margin-bottom:8px">
        <strong>Judge Policy:</strong> <span style="color:var(--accent)">${esc(r.policyUsed.name)}</span>
        ${r.policyUsed.severity_override ? `<span class="sev sev-${r.policyUsed.severity_override}" style="margin-left:8px">${r.policyUsed.severity_override} (override)</span>` : ""}
        <details open style="margin-top:6px"><summary style="cursor:pointer;font-size:11px;color:var(--text2)">View criteria</summary>
          <div style="margin-top:6px;font-size:11px;color:var(--text2)">
            ${r.policyUsed.pass_criteria.length ? `<div style="margin-bottom:4px"><strong style="color:var(--red)">PASS if:</strong> ${r.policyUsed.pass_criteria.map((c) => `<div style="margin-left:12px">• ${esc(c)}</div>`).join("")}</div>` : ""}
            ${r.policyUsed.fail_criteria.length ? `<div style="margin-bottom:4px"><strong style="color:var(--green)">FAIL if:</strong> ${r.policyUsed.fail_criteria.map((c) => `<div style="margin-left:12px">• ${esc(c)}</div>`).join("")}</div>` : ""}
            ${r.policyUsed.partial_criteria.length ? `<div style="margin-bottom:4px"><strong style="color:var(--orange)">PARTIAL if:</strong> ${r.policyUsed.partial_criteria.map((c) => `<div style="margin-left:12px">• ${esc(c)}</div>`).join("")}</div>` : ""}
            ${r.policyUsed.instructions ? `<div style="margin-top:4px;font-style:italic">${esc(r.policyUsed.instructions)}</div>` : ""}
          </div>
        </details>
      </div>`
          : ""
      }
    </div></td>`;
          tbody.appendChild(detailTr);
        });

        tbody.addEventListener("click", (e) => {
          const btn = e.target.closest(".expand-btn");
          if (!btn) return;
          const idx = parseInt(btn.dataset.idx);
          const rows = tbody.querySelectorAll(".detail-row");
          const row = rows[idx];
          if (row.style.display === "none") {
            row.style.display = "";
            btn.textContent = "-";
          } else {
            row.style.display = "none";
            btn.textContent = "+";
          }
        });
      }

      function renderStatic() {
        const sa = report.staticAnalysis;
        const el = $("#staticSection");
        if (!sa.findings.length) {
          el.innerHTML = '<div class="empty">No static analysis findings</div>';
          return;
        }
        el.innerHTML = sa.findings
          .map(
            (f) => `
    <div class="static-item">
      <span class="sev sev-${f.severity}">${f.severity}</span>
      <span class="static-file">${esc(f.file)}${f.line ? `:${f.line}` : ""}</span>
      <span class="static-desc">${esc(f.description)}${f.snippet ? ` <code>${esc(f.snippet)}</code>` : ""}</span>
    </div>
  `,
          )
          .join("");
      }

      function esc(s) {
        if (typeof s !== "string") return "";
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }
    </script>
  </body>
</html>
